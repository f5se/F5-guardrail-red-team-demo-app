<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>登录 - F5 AI Guardrail Lab</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f6f8fb; }
    .wrap { min-height: 100vh; display: grid; place-items: center; }
    .card { width: 380px; background: #fff; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,.08); padding: 24px; }
    h1 { margin: 0 0 16px; font-size: 20px; }
    .row { margin-bottom: 12px; }
    label { display: block; margin-bottom: 6px; font-size: 14px; color: #374151; }
    input { width: 100%; box-sizing: border-box; border: 1px solid #d1d5db; border-radius: 8px; padding: 10px; font-size: 14px; }
    button { width: 100%; border: 0; border-radius: 8px; padding: 10px; background: #2563eb; color: #fff; font-size: 14px; cursor: pointer; }
    .err { min-height: 20px; margin-top: 10px; color: #b91c1c; font-size: 13px; }
    .mascot-stage {
      margin: -2px 0 14px;
      padding: 12px 14px;
      border-radius: 10px;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      border: 1px solid #e5e7eb;
      position: relative;
      display: flex;
      justify-content: space-around;
      align-items: flex-end;
      min-height: 86px;
      overflow: hidden;
    }
    .mascot {
      position: relative;
      width: 46px;
      height: 62px;
      transform-origin: bottom center;
      animation: float 2.8s ease-in-out infinite;
      transition: transform .22s ease;
    }
    .mascot:nth-child(2) { animation-delay: .3s; }
    .mascot:nth-child(3) { animation-delay: .7s; }
    .mascot:nth-child(4) { animation-delay: 1s; }
    .head {
      width: 36px;
      height: 36px;
      margin: 0 auto;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff 0%, #dbeafe 65%, #bfdbfe 100%);
      border: 1px solid #cbd5e1;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 6px rgba(37, 99, 235, .15);
      transform-origin: 50% 65%;
      transition: transform .22s ease;
    }
    .eye {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid #94a3b8;
      position: relative;
      overflow: hidden;
    }
    .pupil {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #0f172a;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      transition: transform .11s linear;
    }
    .body {
      width: 28px;
      height: 24px;
      margin: 2px auto 0;
      border-radius: 12px 12px 10px 10px;
      border: 1px solid #bfdbfe;
      background: linear-gradient(180deg, #dbeafe 0%, #bfdbfe 100%);
      transition: transform .22s ease;
    }
    .mascot.away { transform: translateY(1px); }
    .mascot.away .head { transform: rotate(-28deg) translateX(-5px) translateY(2px); }
    .mascot.away .body { transform: rotate(6deg); }
    .mascot.away:nth-child(2) .head { transform: rotate(30deg) translateX(5px) translateY(2px); }
    .mascot.away:nth-child(3) .head { transform: rotate(-33deg) translateX(-6px) translateY(1px); }
    .mascot.away:nth-child(4) .head { transform: rotate(27deg) translateX(5px) translateY(3px); }
    .mascot.peek .head { transform: rotate(8deg) translateY(3px) scaleY(.97); }
    .mascot.peek .body { transform: translateY(1px); }
    .mascot.peek:nth-child(2) .head { transform: rotate(6deg) translateY(4px) scaleY(.97); }
    .mascot.peek:nth-child(3) .head { transform: rotate(10deg) translateY(3px) scaleY(.96); }
    .mascot.peek:nth-child(4) .head { transform: rotate(7deg) translateY(4px) scaleY(.97); }
    .mascot.bow {
      animation: none;
      transform: translateY(1px);
    }
    .mascot.bow .head,
    .mascot.bow .body {
      animation-duration: 980ms;
      animation-timing-function: cubic-bezier(.26, .72, .24, 1);
      animation-fill-mode: forwards;
    }
    .mascot.bow .head { animation-name: bowHead1; }
    .mascot.bow .body { animation-name: bowBody1; }
    .mascot.bow:nth-child(2) .head { animation-name: bowHead2; }
    .mascot.bow:nth-child(3) .head { animation-name: bowHead3; }
    .mascot.bow:nth-child(4) .head { animation-name: bowHead4; }
    .confetti-layer {
      position: fixed;
      left: 0;
      top: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      overflow: visible;
      z-index: 9999;
    }
    .confetti {
      position: absolute;
      left: 0;
      top: 0;
      width: 12px;
      height: 16px;
      border-radius: 2px;
      opacity: 1;
      transform: translate(var(--x), var(--y));
      animation: confettiBurst 1900ms cubic-bezier(.18, .72, .22, 1) forwards;
      box-shadow: 0 0 0 1px rgba(255,255,255,.25) inset;
    }
    .row-password { position: relative; }
    .row-password input { padding-right: 44px; }
    .toggle-password {
      position: absolute;
      right: 10px;
      top: 33px;
      width: 28px;
      height: 28px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      padding: 0;
      cursor: pointer;
      display: grid;
      place-items: center;
      color: #475569;
    }
    .toggle-password:hover { background: #f1f5f9; }
    .toggle-password svg { width: 20px; height: 20px; }
    .toggle-password .eye-open { display: none; }
    .toggle-password .eye-close { display: block; }
    .toggle-password[data-show="true"] .eye-open { display: block; }
    .toggle-password[data-show="true"] .eye-close { display: none; }
    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
      100% { transform: translateY(0); }
    }
    @keyframes bowBody1 {
      0% { transform: rotate(0deg) translateY(0); }
      30% { transform: rotate(-8deg) translateX(-2px) translateY(1px) scaleY(.98); }
      64% { transform: rotate(-12deg) translateX(-3px) translateY(2px) scaleY(.96); }
      100% { transform: rotate(0deg) translateY(0); }
    }
    @keyframes bowHead1 {
      0% { transform: rotate(0deg) translateY(0) scaleY(1); }
      30% { transform: rotate(-10deg) translateX(-2px) translateY(3px) scaleY(.98); }
      64% { transform: rotate(-17deg) translateX(-3px) translateY(8px) scaleY(.93); }
      100% { transform: rotate(0deg) translateY(0) scaleY(1); }
    }
    @keyframes bowHead2 {
      0% { transform: rotate(0deg) translateY(0) scaleY(1); }
      30% { transform: rotate(-8deg) translateX(-1px) translateY(3px) scaleY(.98); }
      64% { transform: rotate(-15deg) translateX(-2px) translateY(8px) scaleY(.93); }
      100% { transform: rotate(0deg) translateY(0) scaleY(1); }
    }
    @keyframes bowHead3 {
      0% { transform: rotate(0deg) translateY(0) scaleY(1); }
      30% { transform: rotate(-11deg) translateX(-2px) translateY(4px) scaleY(.97); }
      64% { transform: rotate(-18deg) translateX(-3px) translateY(8px) scaleY(.92); }
      100% { transform: rotate(0deg) translateY(0) scaleY(1); }
    }
    @keyframes bowHead4 {
      0% { transform: rotate(0deg) translateY(0) scaleY(1); }
      30% { transform: rotate(-9deg) translateX(-2px) translateY(3px) scaleY(.98); }
      64% { transform: rotate(-16deg) translateX(-3px) translateY(8px) scaleY(.93); }
      100% { transform: rotate(0deg) translateY(0) scaleY(1); }
    }
    @keyframes confettiBurst {
      0% {
        transform: translate(var(--x), var(--y)) scale(.9) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translate(calc(var(--x) + var(--dx)), calc(var(--y) + var(--dy))) scale(1.1) rotate(var(--r));
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>账号登录 | Account Login</h1>
      <div class="mascot-stage" id="mascotStage" aria-hidden="true">
        <div class="mascot">
          <div class="head">
            <span class="eye"><span class="pupil"></span></span>
            <span class="eye"><span class="pupil"></span></span>
          </div>
          <div class="body"></div>
        </div>
        <div class="mascot">
          <div class="head">
            <span class="eye"><span class="pupil"></span></span>
            <span class="eye"><span class="pupil"></span></span>
          </div>
          <div class="body"></div>
        </div>
        <div class="mascot">
          <div class="head">
            <span class="eye"><span class="pupil"></span></span>
            <span class="eye"><span class="pupil"></span></span>
          </div>
          <div class="body"></div>
        </div>
        <div class="mascot">
          <div class="head">
            <span class="eye"><span class="pupil"></span></span>
            <span class="eye"><span class="pupil"></span></span>
          </div>
          <div class="body"></div>
        </div>
        <div class="confetti-layer" id="confettiLayer"></div>
      </div>
      <div class="row">
        <label for="username">用户名 | User Name</label>
        <input id="username" autocomplete="username" />
      </div>
      <div class="row row-password">
        <label for="password">密码 | Password</label>
        <input id="password" type="password" autocomplete="current-password" />
        <button id="togglePassword" class="toggle-password" type="button" data-show="false" aria-label="显示密码">
          <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <path d="M2 12s3.8-6 10-6 10 6 10 6-3.8 6-10 6-10-6-10-6Z"></path>
            <circle cx="12" cy="12" r="3.2"></circle>
          </svg>
          <svg class="eye-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <path d="M3 3l18 18"></path>
            <path d="M10.6 6.3A10.4 10.4 0 0 1 12 6c6.2 0 10 6 10 6a18.4 18.4 0 0 1-3 3.8"></path>
            <path d="M6.6 6.7C3.9 8.3 2 12 2 12s3.8 6 10 6c1.5 0 2.9-.3 4.1-.8"></path>
          </svg>
        </button>
      </div>
      <button id="btnLogin">登录 | Login</button>
      <div class="err" id="err"></div>
    </div>
  </div>
  <script>
    const btn = document.getElementById("btnLogin");
    const err = document.getElementById("err");
    const mascotStage = document.getElementById("mascotStage");
    const confettiLayer = document.getElementById("confettiLayer");
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const togglePassword = document.getElementById("togglePassword");
    const mascots = Array.from(document.querySelectorAll(".mascot"));
    const pupils = Array.from(document.querySelectorAll(".pupil"));
    let mousePos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    let isPasswordShown = false;
    let isBowing = false;
    let activePeekTarget = null;
    let typingTimer = 0;
    let stageClickCount = 0;
    let stageClickTimer = 0;
    let pendingBowTimer = 0;
    let stageClickTimestamps = [];

    function pointEyesAt(targetX, targetY, spread = 2.3) {
      pupils.forEach((pupil, idx) => {
        const eyeRect = pupil.parentElement.getBoundingClientRect();
        const eyeCenterX = eyeRect.left + eyeRect.width / 2;
        const eyeCenterY = eyeRect.top + eyeRect.height / 2;
        const dx = targetX - eyeCenterX;
        const dy = targetY - eyeCenterY;
        const mag = Math.hypot(dx, dy) || 1;
        const normalizedX = (dx / mag) * spread;
        const normalizedY = (dy / mag) * spread;
        const wobble = (idx % 2 === 0 ? -0.4 : 0.4);
        pupil.style.transform = `translate(calc(-50% + ${normalizedX + wobble}px), calc(-50% + ${normalizedY}px))`;
      });
    }

    function pointEyesToOwnHeadTop(spread = 2.7) {
      pupils.forEach((pupil, idx) => {
        const eyeRect = pupil.parentElement.getBoundingClientRect();
        const eyeCenterX = eyeRect.left + eyeRect.width / 2;
        const eyeCenterY = eyeRect.top + eyeRect.height / 2;
        const targetX = eyeCenterX;
        const targetY = eyeCenterY - 24;
        const dx = targetX - eyeCenterX;
        const dy = targetY - eyeCenterY;
        const mag = Math.hypot(dx, dy) || 1;
        const normalizedX = (dx / mag) * spread;
        const normalizedY = (dy / mag) * spread;
        const wobble = (idx % 2 === 0 ? -0.2 : 0.2);
        pupil.style.transform = `translate(calc(-50% + ${normalizedX + wobble}px), calc(-50% + ${normalizedY}px))`;
      });
    }

    function getInputCenter(inputEl) {
      const rect = inputEl.getBoundingClientRect();
      return {
        x: rect.left + rect.width / 2,
        y: rect.top + rect.height / 2
      };
    }

    function updateGaze() {
      if (isBowing) {
        mascots.forEach(m => {
          m.classList.remove("away");
          m.classList.remove("peek");
          m.classList.add("bow");
        });
        return;
      }
      if (isPasswordShown) {
        mascots.forEach(m => m.classList.add("away"));
        mascots.forEach(m => m.classList.remove("peek"));
        mascots.forEach(m => m.classList.remove("bow"));
        pointEyesToOwnHeadTop(2.7);
        return;
      }
      mascots.forEach(m => m.classList.remove("away"));
      mascots.forEach(m => m.classList.remove("bow"));
      if (activePeekTarget) {
        mascots.forEach(m => m.classList.add("peek"));
        const c = getInputCenter(activePeekTarget);
        pointEyesAt(c.x, c.y, 2.8);
        return;
      }
      mascots.forEach(m => m.classList.remove("peek"));
      pointEyesAt(mousePos.x, mousePos.y, 2.3);
    }

    function resetEasterEggClickState() {
      clearTimeout(stageClickTimer);
      clearTimeout(pendingBowTimer);
      stageClickTimestamps = [];
      stageClickCount = 0;
    }

    function triggerBowEasterEgg() {
      if (isBowing) return;
      isBowing = true;
      updateGaze();
      window.setTimeout(() => {
        isBowing = false;
        mascots.forEach(m => m.classList.remove("bow"));
        resetEasterEggClickState();
        updateGaze();
      }, 1180);
    }

    function triggerConfetti() {
      const colors = ["#f43f5e", "#f59e0b", "#22c55e", "#3b82f6", "#a855f7", "#14b8a6"];
      confettiLayer.innerHTML = "";
      const mascotRects = mascots.map(m => m.getBoundingClientRect());
      const piecesPerMascot = 18;
      mascotRects.forEach((rect, mascotIndex) => {
        const originX = rect.left + rect.width / 2;
        const originY = rect.top + rect.height * 0.35;
        for (let i = 0; i < piecesPerMascot; i += 1) {
          const piece = document.createElement("span");
          piece.className = "confetti";
          piece.style.backgroundColor = colors[(mascotIndex * piecesPerMascot + i) % colors.length];
          const outwardSign = mascotIndex < 2 ? -1 : 1;
          const dx = outwardSign * (120 + Math.random() * 220) + (Math.random() * 36 - 18);
          const dy = -(140 + Math.random() * 220);
          piece.style.setProperty("--x", `${originX}px`);
          piece.style.setProperty("--y", `${originY}px`);
          piece.style.setProperty("--dx", `${dx}px`);
          piece.style.setProperty("--dy", `${dy}px`);
          piece.style.setProperty("--r", `${-240 + Math.random() * 480}deg`);
          confettiLayer.appendChild(piece);
          window.setTimeout(() => piece.remove(), 2050);
        }
      });
      window.setTimeout(() => {
        confettiLayer.innerHTML = "";
      }, 2100);
    }

    function handleStageClicksAndEasterEgg() {
      const now = Date.now();
      stageClickTimestamps.push(now);
      stageClickTimestamps = stageClickTimestamps.filter(ts => now - ts <= 2200);
      stageClickCount = stageClickTimestamps.length;
      clearTimeout(stageClickTimer);
      clearTimeout(pendingBowTimer);
      if (stageClickCount >= 5) {
        triggerBowEasterEgg();
        triggerConfetti();
        resetEasterEggClickState();
        return;
      }
      if (stageClickCount === 4) {
        // Give the 5th click enough chance before firing 4-click bow.
        pendingBowTimer = window.setTimeout(() => {
          triggerBowEasterEgg();
          resetEasterEggClickState();
        }, 760);
        return;
      }
      stageClickTimer = window.setTimeout(() => {
        resetEasterEggClickState();
      }, 2300);
    }

    function startPeek(inputEl) {
      activePeekTarget = inputEl;
      clearTimeout(typingTimer);
      typingTimer = setTimeout(() => {
        if (document.activeElement !== usernameInput && document.activeElement !== passwordInput) {
          activePeekTarget = null;
        }
      }, 650);
      updateGaze();
    }

    function syncPeekByFocus() {
      const focused = document.activeElement;
      if (focused === usernameInput || (focused === passwordInput && !isPasswordShown)) {
        activePeekTarget = focused;
      } else {
        activePeekTarget = null;
      }
      updateGaze();
    }

    async function doLogin() {
      err.textContent = "";
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      if (!username || !password) {
        err.textContent = "请输入用户名和密码";
        return;
      }
      const res = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });
      if (!res.ok) {
        const txt = await res.text();
        err.textContent = "登录失败: " + txt;
        return;
      }
      window.location.href = "/";
    }

    function togglePasswordVisibility() {
      isPasswordShown = !isPasswordShown;
      passwordInput.type = isPasswordShown ? "text" : "password";
      togglePassword.dataset.show = String(isPasswordShown);
      togglePassword.setAttribute("aria-label", isPasswordShown ? "隐藏密码" : "显示密码");
      if (isPasswordShown) {
        activePeekTarget = null;
      } else if (document.activeElement === passwordInput) {
        activePeekTarget = passwordInput;
      }
      updateGaze();
    }

    btn.addEventListener("click", doLogin);
    togglePassword.addEventListener("click", togglePasswordVisibility);
    mascotStage.addEventListener("click", () => {
      if (isBowing) return;
      handleStageClicksAndEasterEgg();
    });
    [usernameInput, passwordInput].forEach(inputEl => {
      inputEl.addEventListener("input", () => startPeek(inputEl));
      inputEl.addEventListener("focus", syncPeekByFocus);
      inputEl.addEventListener("blur", () => {
        window.setTimeout(syncPeekByFocus, 0);
      });
    });
    document.addEventListener("mousemove", e => {
      mousePos = { x: e.clientX, y: e.clientY };
      if (!activePeekTarget && !isPasswordShown) {
        updateGaze();
      }
    });
    window.addEventListener("resize", updateGaze);
    document.addEventListener("keydown", e => {
      if (e.key === "Enter") doLogin();
    });
    updateGaze();
  </script>
</body>
</html>
