<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>登录 - F5 AI Guardrail Lab</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f6f8fb; }
    .wrap { min-height: 100vh; display: grid; place-items: center; }
    .card { width: 360px; background: #fff; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,.08); padding: 24px; }
    h1 { margin: 0 0 16px; font-size: 20px; }
    .row { margin-bottom: 12px; }
    label { display: block; margin-bottom: 6px; font-size: 14px; color: #374151; }
    input { width: 100%; box-sizing: border-box; border: 1px solid #d1d5db; border-radius: 8px; padding: 10px; font-size: 14px; }
    button { width: 100%; border: 0; border-radius: 8px; padding: 10px; background: #2563eb; color: #fff; font-size: 14px; cursor: pointer; }
    .err { min-height: 20px; margin-top: 10px; color: #b91c1c; font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>账号登录</h1>
      <div class="row">
        <label for="username">用户名</label>
        <input id="username" autocomplete="username" />
      </div>
      <div class="row">
        <label for="password">密码</label>
        <input id="password" type="password" autocomplete="current-password" />
      </div>
      <button id="btnLogin">登录</button>
      <div class="err" id="err"></div>
    </div>
  </div>
  <script>
    const btn = document.getElementById("btnLogin");
    const err = document.getElementById("err");
    async function doLogin() {
      err.textContent = "";
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      if (!username || !password) {
        err.textContent = "请输入用户名和密码";
        return;
      }
      const res = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });
      if (!res.ok) {
        const txt = await res.text();
        err.textContent = "登录失败: " + txt;
        return;
      }
      window.location.href = "/";
    }
    btn.addEventListener("click", doLogin);
    document.addEventListener("keydown", e => {
      if (e.key === "Enter") doLogin();
    });
  </script>
</body>
</html>
