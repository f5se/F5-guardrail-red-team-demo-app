resolver 114.114.114.114 valid=5s ipv4=on ipv6=off;
subrequest_output_buffer_size 256k;

###############################################################
# Update F5 Guardrails API URL and LLM Provider URL if required
###############################################################
upstream aigr_api {
    zone aigr_api_zone 64k; # Shared memory zone for DNS resolution
    server us1.calypsoai.app:443 resolve;
}
upstream llm_provider_api {
    zone aigr_api_zone 64k; # Shared memory zone for DNS resolution
    server api.deepseek.com:443 resolve;
}

js_import /etc/nginx/js/aigr_filter_redacted.js;
js_import /etc/nginx/js/models_handler.js;

server {

    ####################
    # Update if require
    ####################
    set $aigr_api_host "us1.calypsoai.app";
    #Change to your LLM provider host, like api.openai.com
    set $llm_provider_host "api.deepseek.com";
    set $aigr_api_token "Bearer Your-F5AI-Guardrail-Key";

    set $enable_request_scan "1"; # Set to "0" to disable request scan
    set $enable_response_scan "0"; # Set to "0" to disable response scan
    set $enable_debug_logs "1"; # Enable debug logs

    listen 8787 default_server;
    listen [::]:8787 default_server;
    #listen 8343 ssl default_server;
    #listen [::]:8343 ssl default_server;
    #http2 on;
    #ssl_certificate /etc/ssl/certs/ce-local.crt;
    #ssl_certificate_key /etc/ssl/private/ce-local.key;
    server_name localhost;

    location /v1/health {
       return 200 'OK';
       add_header Content-Type text/plain;
    }

    # Endpoint for OpenAI-compatible chat completions
    location /v1/chat/completions {
        js_content aigr_filter_redacted.filterChatCompletion;
        default_type application/json;
        add_header Content-Type application/json always;
        #subrequest_output_buffer_size 256k; # Explicitly set for this location
        proxy_read_timeout 120s; # Total chain: Guardrail + LLM
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        access_log /var/log/nginx/debug.log custom; # Debug log to confirm location block
    }

    # Endpoint for OpenAI-compatible models list (for Open-WebUI)
    location /v1/models {
        js_content models_handler.handleModels;
        default_type application/json;
        add_header Content-Type application/json always;
        #subrequest_output_buffer_size 256k; # Buffer for subrequest response
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        access_log /var/log/nginx/debug.log custom;
    }

    # Proxy to F5 AI Guardrails API for scanning
    location /aigr_scan {
        proxy_pass https://aigr_api/backend/v1/scans;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 90s;
        proxy_set_header Host $aigr_api_host;
        proxy_set_header Content-Type application/json;
        proxy_set_header Authorization $aigr_api_token;
        proxy_set_header Accept-Encoding gzip; # Enable gzip if supported
        proxy_buffer_size 256k; # Increased buffer for upstream response
        proxy_buffers 8 256k;   # Increased number and size of buffers
        proxy_busy_buffers_size 512k; # Handle busy buffers during response
        proxy_ssl_server_name on;
        proxy_ssl_name $aigr_api_host; # Explicitly set SNI hostname
        proxy_ssl_protocols TLSv1.2 TLSv1.3; # Use modern TLS protocols
        proxy_ssl_verify off; # Temporary for debugging; re-enable in production
    }


    # Proxy LLM provider Chat completions
    location /llm_provider {
        proxy_pass https://llm_provider_api/v1/chat/completions;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
        proxy_set_header Host $llm_provider_host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Content-Type application/json;
        proxy_set_header Accept-Encoding gzip;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_buffer_size 256k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 512k;
        proxy_ssl_server_name on;
        proxy_ssl_name $llm_provider_host;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_ssl_verify off; # Temporary for debugging; re-enable in production
    }

}